<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Linux Virtual Machine</title>

  <!-- Load v86 -->
  <script src="https://copy.sh/v86/build/v86.js"></script>

  <style>
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      padding: 20px;
    }

    #log {
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      height: 150px;
      overflow-y: auto;
      border: 1px solid #333;
      white-space: pre-wrap;
    }

    #screen {
      width: 800px;
      height: 600px;
      background: #000;
      border: 1px solid #333;
      margin-top: 10px;
    }

    #start-btn {
      margin-top: 10px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="log"></div>
  <button id="start-btn">Start VM</button>
  <div id="screen"></div>

  <script>
    const logEl = document.getElementById("log");
    const screenEl = document.getElementById("screen");
    const startBtn = document.getElementById("start-btn");

    function log(msg) {
      console.log(msg);
      logEl.textContent += msg + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    let emulator = null;

    async function startVM() {
      if (emulator) return;
      startBtn.disabled = true;

      log("Initializing virtual machine...");
      log("Downloading Alpine Linux ISO...");

      const LINUX_IMAGE_URL =
        "https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86/alpine-standard-3.19.1-x86.iso";

      const loadingBar = document.createElement("div");
      loadingBar.style.height = "6px";
      loadingBar.style.width = "0%";
      loadingBar.style.background = "#4caf50";
      loadingBar.style.marginTop = "6px";
      loadingBar.style.transition = "width 0.2s linear";
      logEl.appendChild(loadingBar);

      emulator = new V86Starter({
        wasm_path: "https://copy.sh/v86/build/v86.wasm",
        memory_size: 256 * 1024 * 1024,
        vga_memory_size: 8 * 1024 * 1024,

        screen_container: screenEl,

        bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
        vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },
        cdrom: { url: LINUX_IMAGE_URL },
        autostart: true,
      });

      emulator.add_listener("emulator-ready", function () {
        log("Booting Alpine Linux...");
      });

      emulator.add_listener("download-progress", function (e) {
        if (!e.file || !e.loaded || !e.total) return;
        const pct = ((e.loaded / e.total) * 100).toFixed(1);
        loadingBar.style.width = pct + "%";
        log(`Downloading ${e.file}: ${pct}%`);
      });

      emulator.add_listener("download-error", function (e) {
        log("ERROR: Failed to download " + (e.file || "unknown file"));
        startBtn.disabled = false;
        loadingBar.style.background = "#e53935";
      });

      emulator.add_listener("halt", function () {
        log("VM halted.");
        startBtn.disabled = false;
        emulator = null;
      });
    }

    document.addEventListener("keydown", (e) => {
      if (!emulator) return;

      if (e.ctrlKey && e.altKey && e.key === "f") {
        if (screenEl.requestFullscreen) screenEl.requestFullscreen();
      }

      if (e.ctrlKey && e.altKey && e.key === "r") {
        log("Resetting VM...");
        emulator.stop();
        emulator = null;
        startVM();
      }
    });

    startBtn.addEventListener("click", startVM);
  </script>

</body>
</html>
