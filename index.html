<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Browser Linux Virtual Machine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.5rem 1rem;
      background: #181818;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    header span {
      opacity: 0.8;
    }
    #vm-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.5rem;
      box-sizing: border-box;
    }
    #screen {
      flex: 1;
      border: 1px solid #333;
      background: #000;
      image-rendering: pixelated;
    }
    #log {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      max-height: 6rem;
      overflow-y: auto;
      background: #181818;
      padding: 0.5rem;
      border-radius: 4px;
      border: 1px solid #333;
      white-space: pre-wrap;
    }
    button {
      background: #2b6cb0;
      color: #fff;
      border: none;
      padding: 0.35rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    a {
      color: #63b3ed;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <strong>Browser Linux VM</strong>
      <span> — runs a small Linux distro entirely in your browser</span>
    </div>
    <div>
      <button id="start-btn">Start VM</button>
    </div>
  </header>

  <div id="vm-container">
    <canvas id="screen"></canvas>
    <div id="log"></div>
  </div>

  <!-- v86 core (from official CDN) -->
  <script src="https://copy.sh/v86/build/v86_all.js"></script>
  <script>
    const logEl = document.getElementById("log");
    const screenEl = document.getElementById("screen");
    const startBtn = document.getElementById("start-btn");

    function log(msg) {
      console.log(msg);
      logEl.textContent += msg + "\\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    let emulator = null;

    async function startVM() {
      if (emulator) return;
      startBtn.disabled = true;
      log("Initializing virtual machine...");

      // You can replace this with another Linux image URL later.
      // This is a small Linux image suitable for demo use.
     const LINUX_IMAGE_URL = "https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86/alpine-standard-3.19.1-x86.iso";

      emulator = new V86({
        wasm_path: "https://copy.sh/v86/build/v86.wasm",
        memory_size: 256 * 1024 * 1024, // 256 MB
        vga_memory_size: 8 * 1024 * 1024,
        screen_container: screenEl,
        bios: {
          url: "https://copy.sh/v86/bios/seabios.bin",
        },
        vga_bios: {
          url: "https://copy.sh/v86/bios/vgabios.bin",
        },
        cdrom: {
          url: LINUX_IMAGE_URL,
        },
        autostart: true,
      });

      emulator.add_listener("emulator-ready", function () {
        log("Emulator ready. Booting Linux...");
      });

      emulator.add_listener("download-progress", function (e) {
        if (!e.file || !e.loaded || !e.total) return;
        const pct = ((e.loaded / e.total) * 100).toFixed(1);
        log(`Downloading ${e.file}: ${pct}%`);
      });

      emulator.add_listener("download-error", function (e) {
        log("Download error: " + (e.file || "unknown file"));
      });

      emulator.add_listener("serial0-output-char", function (c) {
        // Optional: mirror serial output into log
        // log("[serial] " + c);
      });

      emulator.add_listener("halt", function () {
        log("VM halted.");
        startBtn.disabled = false;
        emulator = null;
      });
    }

    startBtn.addEventListener("click", startVM);
  </script>
</body>
</html>
